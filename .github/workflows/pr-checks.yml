name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CLOAKBROWSER_AUTO_UPDATE: 'false'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.NPM_CONFIG_CACHE }}
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm run ci:install

      - name: Check formatting
        run: npm run format:check

      - name: Validate Dependabot configuration
        run: npm run validate:dependabot

      - name: Generate package metadata
        run: npm run generate:package-metadata -- --release-date=2026-05-18

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run test:types

      - name: Unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Build production bundles
        run: npm run build:prod

  package-smoke-fedora:
    name: Package Smoke (Fedora Linux)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FEDORA_RELEASE_IMAGE: gpt-voice-fedora-release:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Fedora release workspace
        uses: actions/cache@v6
        with:
          path: |
            .cache/npm
            .cache/electron
            .cache/electron-builder
            .cache/fedora-home
          key: ${{ runner.os }}-fedora-smoke-workspace-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs', 'build/fedora-release/**') }}
          restore-keys: |
            ${{ runner.os }}-fedora-smoke-workspace-

      - name: Build Fedora release image
        uses: docker/build-push-action@v7
        with:
          context: build/fedora-release
          file: build/fedora-release/Dockerfile
          load: true
          tags: ${{ env.FEDORA_RELEASE_IMAGE }}
          cache-from: type=gha,scope=fedora-release-image
          cache-to: type=gha,mode=max,scope=fedora-release-image

      - name: Smoke package app in Fedora
        run: node scripts/build-fedora-release.mjs --skip-image-build --image=${{ env.FEDORA_RELEASE_IMAGE }} --mode=smoke --release-date=2026-05-18

  package-smoke-windows:
    name: Package Smoke (Windows)
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Electron and CloakBrowser binaries
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.NPM_CONFIG_CACHE }}
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
            ~/.cloakbrowser
          key: ${{ runner.os }}-electron-cloak-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs') }}
          restore-keys: |
            ${{ runner.os }}-electron-cloak-

      - name: Install dependencies
        run: npm run ci:install

      - name: Prepare bundled CloakBrowser
        run: npm run prepare:cloakbrowser -- --target=win32

      - name: Smoke test CloakBrowser
        run: npm run smoke:cloakbrowser

      - name: Build production bundles
        run: npm run build:prod

      - name: Generate package metadata
        run: npm run generate:package-metadata -- --release-date=2026-05-18

      - name: Package unpacked app
        run: npx electron-builder --win dir

      - name: Verify packaged runtime
        run: npm run verify:packaged
