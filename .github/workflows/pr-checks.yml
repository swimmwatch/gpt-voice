name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CLOAKBROWSER_AUTO_UPDATE: 'false'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.NPM_CONFIG_CACHE }}
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm run ci:install

      - name: Install documentation tools
        run: npm run docs:install

      - name: Sync documentation assets
        run: npm run docs:sync-assets

      - name: Build documentation
        run: npm run docs:build

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y ffmpeg

      - name: Check formatting
        run: npm run format:check

      - name: Validate Dependabot configuration
        run: npm run validate:dependabot

      - name: Generate package metadata
        run: npm run generate:package-metadata -- --release-date=2026-05-18

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run test:types

      - name: Unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Build production bundles
        run: npm run build:prod

  landing:
    name: Landing Page Checks
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y ffmpeg

      - name: Install browser engines
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Typecheck landing
        run: npm run landing:typecheck

      - name: Lint landing
        run: npm run landing:lint

      - name: Check landing formatting
        run: npm run landing:format:check

      - name: Build landing
        run: npm run landing:build

      - name: Run landing component tests
        run: npm run landing:test

      - name: Run landing contract tests
        run: npx tsx --tsconfig tsconfig.landing.node.json --test tests/landing-page/*.test.ts

      - name: Verify landing media
        run: npm run landing:verify:media

      - name: Verify landing SEO
        run: npm run landing:verify:seo

      - name: Verify landing accessibility
        run: npm run landing:verify:a11y

      - name: Verify landing browser support
        run: npm run landing:verify:browser-support

      - name: Verify landing size budgets
        run: npm run landing:verify:sizes

      - name: Run landing browser tests
        run: npm run landing:test:e2e

  media:
    name: Product Video Checks
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            media/video/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install video dependencies
        run: npm ci --prefix media/video

      - name: Typecheck product video
        run: npm --prefix media/video run typecheck

      - name: Run video timeline tests
        run: npm --prefix media/video run test:timeline

      - name: Run video content tests
        run: npm --prefix media/video run test:content

      - name: Run video scene tests
        run: npm --prefix media/video run test:scenes

      - name: Run video UI tests
        run: npm --prefix media/video run test:ui

      - name: Validate video timeline
        run: npm --prefix media/video run validate:timeline

      - name: Render representative video frame
        run: npm --prefix media/video run render:representative

  pages:
    name: GitHub Pages Artifact Checks
    needs: landing
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Install documentation tools
        run: npm run docs:install

      - name: Sync documentation assets
        run: npm run docs:sync-assets

      - name: Install browser engines
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build combined Pages artifact
        run: npm run pages:build

      - name: Verify Pages artifact contract
        run: node --import tsx --test tests/documentation/pagesArtifact.test.ts

      - name: Run Pages browser tests
        run: npm run pages:test:e2e

  package-smoke-fedora:
    name: Package Smoke (Fedora Linux)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FEDORA_RELEASE_IMAGE: gpt-voice-fedora-release:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Fedora release workspace
        uses: actions/cache@v6
        with:
          path: |
            .cache/npm
            .cache/electron
            .cache/electron-builder
            .cache/fedora-home
          key: ${{ runner.os }}-fedora-smoke-workspace-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs', 'build/fedora-release/**') }}
          restore-keys: |
            ${{ runner.os }}-fedora-smoke-workspace-

      - name: Build Fedora release image
        uses: docker/build-push-action@v7
        with:
          context: build/fedora-release
          file: build/fedora-release/Dockerfile
          load: true
          tags: ${{ env.FEDORA_RELEASE_IMAGE }}
          cache-from: type=gha,scope=fedora-release-image
          cache-to: type=gha,mode=max,scope=fedora-release-image

      - name: Smoke package app in Fedora
        run: node scripts/build-fedora-release.mjs --skip-image-build --image=${{ env.FEDORA_RELEASE_IMAGE }} --mode=smoke --release-date=2026-05-18

      - name: Upload Linux measurement reports
        uses: actions/upload-artifact@v7
        with:
          name: gpt-voice-linux-measurements
          path: |
            release-artifacts/size-linux-x64.json
            release-artifacts/startup-linux-x64.json
          if-no-files-found: error
          retention-days: 14

  package-smoke-windows:
    name: Package Smoke (Windows)
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Electron and CloakBrowser binaries
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.NPM_CONFIG_CACHE }}
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
            ~/.cloakbrowser
          key: ${{ runner.os }}-electron-cloak-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs') }}
          restore-keys: |
            ${{ runner.os }}-electron-cloak-

      - name: Install dependencies
        run: npm run ci:install

      - name: Prepare bundled CloakBrowser
        run: npm run prepare:cloakbrowser -- --target=win32

      - name: Smoke test CloakBrowser
        run: npm run smoke:cloakbrowser

      - name: Build production bundles
        run: npm run build:prod

      - name: Generate package metadata
        run: npm run generate:package-metadata -- --release-date=2026-05-18

      - name: Package unpacked app
        run: npx electron-builder --win dir

      - name: Verify packaged runtime
        run: npm run verify:packaged

      - name: Measure Windows package size
        run: npm run measure:size -- --platform=win32 --arch=x64 --output=release-artifacts/size-win32-x64.json

      - name: Verify Windows size budget when a reviewed baseline exists
        if: hashFiles('build/size-baselines/v1.4.0-win32-x64.json') != ''
        run: npm run verify:size -- --report=release-artifacts/size-win32-x64.json --baseline=build/size-baselines/v1.4.0-win32-x64.json

      - name: Measure Windows cold startup
        run: npm run measure:startup -- --runs=10 --output=release-artifacts/startup-win32-x64.json

      - name: Upload Windows measurement reports
        uses: actions/upload-artifact@v7
        with:
          name: gpt-voice-windows-measurements
          path: |
            release-artifacts/size-win32-x64.json
            release-artifacts/startup-win32-x64.json
          if-no-files-found: error
          retention-days: 14
