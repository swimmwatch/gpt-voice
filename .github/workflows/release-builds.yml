name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to use for generated app/package versions, for example v1.0.6.
        required: false
        type: string
      baseline_ref:
        description: v1.4.0 reference commit for a native Windows size-baseline rebuild.
        required: false
        default: 3845bad421f32650cb57a44f32345bfe0f46a127
        type: string
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  CLOAKBROWSER_AUTO_UPDATE: 'false'

jobs:
  build-linux:
    name: Build Fedora Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FEDORA_RELEASE_IMAGE: gpt-voice-fedora-release:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Fedora release workspace
        uses: actions/cache@v6
        with:
          path: |
            .cache/npm
            .cache/electron
            .cache/electron-builder
            .cache/fedora-home
          key: ${{ runner.os }}-fedora-release-workspace-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs', 'build/fedora-release/**') }}
          restore-keys: |
            ${{ runner.os }}-fedora-release-workspace-

      - name: Build Fedora release image
        uses: docker/build-push-action@v7
        with:
          context: build/fedora-release
          file: build/fedora-release/Dockerfile
          load: true
          tags: ${{ env.FEDORA_RELEASE_IMAGE }}
          cache-from: type=gha,scope=fedora-release-image
          cache-to: type=gha,mode=max,scope=fedora-release-image

      - name: Build Linux release artifacts in Fedora
        env:
          PACKAGE_RELEASE_DATE: ${{ github.event.release.published_at }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          WORKFLOW_DISPATCH_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: node scripts/build-fedora-release.mjs --skip-image-build --image=${{ env.FEDORA_RELEASE_IMAGE }} --mode=release

      - name: Upload Linux installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gpt-voice-linux
          path: release-artifacts/linux/*
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Electron and CloakBrowser binaries
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.NPM_CONFIG_CACHE }}
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
            ~/.cloakbrowser
          key: ${{ runner.os }}-release-electron-cloak-${{ hashFiles('package-lock.json', 'package.json', 'scripts/prepare-cloakbrowser.mjs') }}
          restore-keys: |
            ${{ runner.os }}-release-electron-cloak-

      - name: Build Windows v1.4 reference when requested
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.baseline_ref != ''
        shell: pwsh
        env:
          BASELINE_REF: ${{ github.event.inputs.baseline_ref }}
        run: |
          git worktree add --detach .size-baseline $env:BASELINE_REF
          Push-Location .size-baseline
          npm run ci:install
          npm run prepare:cloakbrowser -- --target=win32
          npm run smoke:cloakbrowser
          npm run build:prod
          npm run generate:package-metadata -- --release-date=2026-07-11
          $env:CSC_IDENTITY_AUTO_DISCOVERY = 'false'
          npx electron-builder --win --publish never
          npm run verify:packaged
          npm run verify:installers -- --platform=win32
          npm run measure:size -- --platform=win32 --arch=x64 --output=release-artifacts/size-win32-x64.json
          Pop-Location

      - name: Upload Windows v1.4 reference size report
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.baseline_ref != ''
        uses: actions/upload-artifact@v7
        with:
          name: gpt-voice-win32-v1.4.0-baseline
          path: .size-baseline/release-artifacts/size-win32-x64.json
          if-no-files-found: error
          retention-days: 30

      - name: Install dependencies
        run: npm run ci:install

      - name: Apply release version from tag
        if: github.event_name == 'release' || github.event.inputs.release_tag != ''
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          WORKFLOW_DISPATCH_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: npm run apply:release-version

      - name: Prepare bundled CloakBrowser
        run: npm run prepare:cloakbrowser -- --target=win32

      - name: Smoke test CloakBrowser
        run: npm run smoke:cloakbrowser

      - name: Build production bundles
        run: npm run build:prod

      - name: Generate package metadata
        env:
          PACKAGE_RELEASE_DATE: ${{ github.event.release.published_at }}
        run: npm run generate:package-metadata

      - name: Package app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish never

      - name: Verify packaged runtime
        run: npm run verify:packaged

      - name: Verify installer behavior
        run: npm run verify:installers -- --platform=win32

      - name: Measure Windows package size
        run: npm run measure:size -- --platform=win32 --arch=x64 --output=release-artifacts/size-win32-x64.json

      - name: Verify Windows size budget when a reviewed baseline exists
        if: hashFiles('build/size-baselines/v1.4.0-win32-x64.json') != ''
        run: npm run verify:size -- --report=release-artifacts/size-win32-x64.json --baseline=build/size-baselines/v1.4.0-win32-x64.json

      - name: Measure Windows cold startup
        run: npm run measure:startup -- --runs=10 --output=release-artifacts/startup-win32-x64.json

      - name: Collect installer artifacts
        run: npm run collect:release-artifacts -- --platform=win32

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gpt-voice-win32
          path: release-artifacts/win32/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-windows
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: gpt-voice-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --repo "$GH_REPO" \
              --title "GPT-Voice ${RELEASE_TAG}" \
              --notes "Install GPT-Voice by downloading the package for your operating system below."
          fi
