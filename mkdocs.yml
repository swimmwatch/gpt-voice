site_name: GPT-Voice Documentation
site_description: User guide for GPT-Voice desktop transcription.
site_url: https://swimmwatch.github.io/gpt-voice/docs/

docs_dir: docs/user-guide
site_dir: build/github-pages/docs
exclude_docs: |
  data/

theme:
  name: material
  custom_dir: docs/mkdocs-overrides
  language: en
  font: false
  logo: assets/generated/icons/gpt-voice.png
  favicon: assets/generated/icons/gpt-voice.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.sections
    - navigation.top
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips

nav:
  - Overview: index.md
  - Install, update, or remove:
      - Overview: install.md
      - Windows: install/windows.md
      - Linux: install/linux.md
      - macOS: install/macos.md
  - Use GPT-Voice:
      - First use: getting-started.md
      - Record and transcribe: guides/transcription.md
      - Providers: guides/providers.md
      - Text actions: guides/text-actions.md
      - History and tray: guides/history-and-tray.md
  - Settings:
      - Overview: settings/index.md
      - Provider settings: settings/providers.md
      - Shortcut settings: settings/shortcuts.md
      - Prettify settings: settings/prettify.md
      - Browser settings: settings/browser.md
      - Network settings: settings/network.md
  - Support:
      - Privacy and data: privacy.md
      - Troubleshooting: troubleshooting.md
      - FAQ: faq.md

